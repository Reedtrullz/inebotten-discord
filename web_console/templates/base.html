<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {refresh_meta}
  <title>{title}</title>
  <script>
    (function() {{
      var theme = localStorage.getItem('theme');
      if (!theme) {{
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }}
      document.documentElement.classList.add(theme);
    }})();
  </script>
  <link rel="stylesheet" href="/static/main.css?v=4">
  <script src="/static/app.js?v=4" defer></script>
</head>
<body class="{body_class}">
  <div class="app-shell" data-console-app>
    <div
      id="auth-expired"
      class="auth-expired-banner"
      hidden
    >
      Økta er utløpt. <a href="/login" class="underline">Logg inn på nytt</a>.
    </div>
    <a href="#main-content" class="skip-link">Hopp til hovedinnhold</a>

    <header role="banner" class="site-header">
      <div class="header-inner">
        <div class="header-row">
          <div class="brand-cluster">
            <a href="/" class="brand-mark">Inebotten</a>
            <span id="shell-status" class="badge badge-online">Online</span>
          </div>
          <button id="mobile-menu-toggle" class="menu-toggle" aria-label="Meny" aria-expanded="false" aria-controls="primary-nav">
            <span class="menu-icon-open">☰</span>
            <span class="menu-icon-close" hidden>✕</span>
          </button>
          <nav
            id="primary-nav"
            class="primary-nav"
            aria-label="Hovednavigasjon"
          >
            <a href="#overview" class="nav-link">Oversikt</a>
            <a href="#status" class="nav-link">Status</a>
            <a href="#calendar" class="nav-link">Kalender</a>
            <a href="#polls" class="nav-link">Avstemninger</a>
            <a href="#diagnostics" class="nav-link">Diagnostikk</a>
            <a href="#memory" class="nav-link">Minne</a>
            <a href="/commands" class="nav-link">Kommandoer</a>
            <a href="#logs" class="nav-link">Logger</a>
          </nav>
          <div class="header-tools">
            <span id="last-updated" class="freshness" hidden>
              Oppdatert <span data-last-updated-time></span>
            </span>
            <button id="theme-toggle" class="theme-toggle" aria-label="Bytt tema">
              <span data-theme-icon>Lys</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="page-wrap">
      {initial_data_script}
      <main id="main-content" class="dashboard-grid" tabindex="-1">
        {main_content}
      </main>
    </div>

    <footer role="contentinfo" class="site-footer">
      <div class="footer-inner">
        {footer_content}
      </div>
    </footer>

    <div
      id="section-modal"
      class="modal-layer"
      hidden
    >
      <div
        class="modal-backdrop"
        data-close-modal
      ></div>

      <div
        class="modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
        tabindex="-1"
      >
        <div class="modal-header">
          <h3 id="modal-title">Detaljer</h3>
          <button data-close-modal class="modal-close" aria-label="Lukk">
            &#x2715;
          </button>
        </div>
        <div class="modal-body">
          <pre id="modal-content"></pre>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
