name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

    - name: Lint with flake8
      run: |
        # Stop on syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat warnings as info only (exit 0)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check for hardcoded secrets
      run: |
        # Simple check for common patterns (Discord tokens, etc)
        if grep -r "MTE0N\|MTQ3N\|discord_token=\"\|DISCORD_USER_TOKEN=\"[^$]" --include="*.py" . 2>/dev/null; then
          echo "⚠️  Potential hardcoded token found. Use environment variables!"
          exit 1
        fi
        echo "✅ No hardcoded secrets detected"

    - name: Syntax check with py_compile
      run: |
        python -m py_compile $(find . -name "*.py" -not -path "./.git/*" -not -path "./__pycache__/*")

    - name: Check import structure
      run: |
        python -c "
import sys
sys.path.insert(0, '.')
try:
    from ai import hermes_connector
    from cal_system import calendar_manager
    from core import message_monitor
    from features import weather_api
    print('✅ Core imports work')
except ImportError as e:
    print(f'❌ Import error: {e}')
    sys.exit(1)
"

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run security scan
      uses: securecodewarrior/github-action-add-sarif@v1
      continue-on-error: true

    - name: Check for sensitive files
      run: |
        if [ -f ".env" ]; then
          echo "❌ .env file should not be committed"
          exit 1
        fi
        if ls data/*.json 1> /dev/null 2>&1; then
          echo "⚠️  JSON files in data/ should be in .gitignore"
        fi
        echo "✅ Sensitive file check passed"
