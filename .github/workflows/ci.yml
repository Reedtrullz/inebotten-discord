name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Check for syntax errors and undefined names
        run: |
          python -m flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Compile Python files
        run: |
          python -m compileall \
            -q \
            -x '(^|/)(\.git|__pycache__|\.pytest_cache)(/|$)' \
            .

      - name: Run tests
        run: python -m pytest -q

      - name: Check for committed secrets
        run: |
          if git grep -n -E 'M[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{6,}\.[A-Za-z0-9_-]{20,}' -- '*.py' '*.env' '*.md' '*.yml' '*.yaml'; then
            echo "Potential hardcoded secret found. Use environment variables instead."
            exit 1
          fi

          if find . \( -name '.env' -o -name '.env.bak' -o -path './data/*' \) | grep -q .; then
            echo "Sensitive local data file found in the repository."
            exit 1
          fi
