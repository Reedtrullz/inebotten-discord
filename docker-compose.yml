services:
  data-permissions:
    image: alpine:3.20
    command: ["sh", "-c", "mkdir -p /data && chown -R 10001:10001 /data && chmod 700 /data"]
    volumes:
      - ./data:/data
    restart: "no"

  inebotten:
    build:
      context: .
      args:
        SOURCE_COMMIT: ${SOURCE_COMMIT:-}
        COMMIT_SHA: ${COMMIT_SHA:-}
    container_name: inebotten-bot
    restart: always
    user: "10001:10001"
    env_file:
      - .env
    volumes:
      # Persistent storage for calendar, memory, and tokens
      - ./data:/home/inebotten/.hermes
    environment:
      # Keep token/config/data paths aligned with the mounted persistent volume.
      - HERMES_HOME=/home/inebotten/.hermes
      - HERMES_BRIDGE_HOST=0.0.0.0
      - HERMES_BRIDGE_PORT=3000
      # Bind console to all interfaces so Caddy can reach it
      - CONSOLE_HOST=0.0.0.0
      - CONSOLE_PORT=8080
    expose:
      - "8080"
    depends_on:
      data-permissions:
        condition: service_completed_successfully
    ports:
      # Localhost-only diagnostic access on the VPS. Public access still goes through Caddy.
      - "127.0.0.1:8080:8080"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: inebotten-caddy
    restart: always
    profiles:
      - bundled-caddy
    environment:
      - CADDY_CONFIG_REV=2026-04-28-console-upstream
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - inebotten

volumes:
  data:
  caddy_data:
  caddy_config:
